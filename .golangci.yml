version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - copyloopvar
    - gocritic
    - noctx
  settings:
    errcheck:
      check-type-assertions: true
    govet:
      enable:
        - shadow

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/tiendv89/workspace-github-adapter

issues:
  max-same-issues: 0
